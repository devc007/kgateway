apiVersion: v1
kind: Service
metadata:
  name: basicrouting-backend
  namespace: kgateway-test
spec:
  selector:
    app.kubernetes.io/name: basicrouting-echo
  ports:
    - protocol: TCP
      port: 8080
      targetPort: http-web-svc
---
apiVersion: v1
kind: Pod
metadata:
  name: basicrouting-echo
  namespace: kgateway-test
  labels:
    app.kubernetes.io/name: basicrouting-echo
spec:
  containers:
    - name: echo
      image: registry.k8s.io/gateway-api/echo-basic:v1.5.0
      ports:
        - containerPort: 3000
          name: http-web-svc
      env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
