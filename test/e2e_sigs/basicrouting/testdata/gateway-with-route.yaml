apiVersion: v1
kind: Namespace
metadata:
  name: kgateway-test
---
# Gateway and HTTPRoute for basicrouting POC tests
# These resources define a Gateway with multiple listeners (ports 80 and 8080)
# and an HTTPRoute that routes requests to an echo backend service
kind: Gateway
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: basicrouting-gateway
  namespace: kgateway-test
spec:
  gatewayClassName: kgateway
  listeners:
    - protocol: HTTP
      port: 8080
      name: http-8080
      allowedRoutes:
        namespaces:
          from: Same
    - protocol: HTTP
      port: 80
      name: http-80
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: basicrouting-route
  namespace: kgateway-test
spec:
  parentRefs:
    - name: basicrouting-gateway
      namespace: kgateway-test
  hostnames:
    - "example.com"
  rules:
    - backendRefs:
        - name: basicrouting-backend
          port: 8080
